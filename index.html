<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tender Memo Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Tender Memo Directory</h1>
                <p class="text-xs text-slate-500 mt-0.5">Reference documents and application rules for tender preparation</p>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="manageCatsBtn" class="flex-1 sm:flex-initial px-3 py-1.5 border border-slate-200 text-slate-700 rounded-md text-sm font-medium hover:bg-slate-50 transition flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-tags"></i> Categories
                </button>
                <button id="exportBtn" class="flex-1 sm:flex-initial px-3 py-1.5 border border-slate-200 text-slate-700 rounded-md text-sm font-medium hover:bg-slate-50 transition flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-download"></i> Export
                </button>
                <button id="addMemoBtn" class="flex-1 sm:flex-initial px-3 py-1.5 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 transition flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-plus"></i> Add Memo
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-1 w-full flex flex-col gap-6">
        
        <!-- Search & Filters -->
        <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 items-center bg-white p-4 border border-slate-200 rounded-xl shadow-sm">
            <div class="sm:col-span-2 relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" id="searchInput" placeholder="Search reference, topic, or application..." class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50/50">
            </div>
            
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <i class="fa-solid fa-filter text-sm"></i>
                </span>
                <input type="text" id="condSearchInput" placeholder="Search conditions..." class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50/50">
            </div>
            
            <div>
                <select id="categoryFilter" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                    <option value="all">All Categories</option>
                </select>
            </div>
        </div>

        <!-- Directory Table -->
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex-1 flex flex-col min-h-[500px]">
            <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <h2 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                    <i class="fa-solid fa-folder-open text-slate-500"></i> Active Tender References
                </h2>
                <div class="bg-blue-50 text-blue-700 border border-blue-200 text-xs font-bold px-2.5 py-0.5 rounded-full">
                    <span id="memoCount">0</span> Records
                </div>
            </div>

            <div class="overflow-x-auto custom-scroll flex-1">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-200 text-slate-500 text-[11px] font-bold uppercase tracking-wider">
                            <th class="py-3 px-4 w-40">Memo Reference</th>
                            <th class="py-3 px-4">Topic / Scope</th>
                            <th class="py-3 px-4">Conditions</th>
                            <th class="py-3 px-4">Tender Application</th>
                            <th class="py-3 px-4">Category</th>
                            <th class="py-3 px-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="memoTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Memo Modal -->
    <div id="memoModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex justify-end transition-opacity duration-300">
        <div class="bg-white w-full max-w-lg h-full p-6 shadow-2xl flex flex-col justify-between transform transition-transform duration-300 translate-x-full">
            <div class="overflow-y-auto custom-scroll flex-1 pr-1 pb-4">
                <div class="flex justify-between items-center pb-4 border-b border-slate-100">
                    <h2 class="text-base font-bold text-slate-900" id="modalTitle">New Memo Entry</h2>
                    <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 p-1"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <form id="memoForm" class="mt-6 space-y-4">
                    <input type="hidden" id="memoId">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Reference No.</label>
                        <input type="text" id="memoRef" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="e.g. DEVB(W) 510/34/01">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Topic / Scope</label>
                        <input type="text" id="memoTopic" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="e.g. Assessing PII for Works Contracts">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Document Link (URL)</label>
                        <input type="url" id="memoLink" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="https://...">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Category</label>
                            <select id="memoCategory" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Conditions</label>
                            <input type="text" id="memoConditions" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="e.g. Mandatory, > $1000M">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Primary Tender Application</label>
                        <textarea id="memoApplication" rows="4" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="Describe how this memo is used..."></textarea>
                    </div>
                </form>
            </div>
            <div class="pt-4 border-t border-slate-100 flex gap-3">
                <button id="cancelFormBtn" class="flex-1 py-2 border border-slate-200 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 transition">Cancel</button>
                <button id="saveFormBtn" class="flex-1 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">Save Entry</button>
            </div>
        </div>
    </div>

    <!-- Category Management Modal -->
    <div id="catModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-xl p-6 shadow-2xl">
            <div class="flex justify-between items-center pb-4 border-b border-slate-100">
                <h2 class="text-base font-bold text-slate-900">Manage Categories</h2>
                <button id="closeCatModalBtn" class="text-slate-400 hover:text-slate-600 p-1"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="mt-4 space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="newCatInput" class="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="New Category Name">
                    <button id="addCatBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Add</button>
                </div>
                <div id="catList" class="max-h-60 overflow-y-auto custom-scroll space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteConfirmModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-xl p-6 shadow-2xl">
            <div class="text-center">
                <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-trash-can text-xl"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-900 mb-2">Delete Reference?</h3>
                <p class="text-sm text-slate-500 mb-6">This action cannot be undone.</p>
                <div class="flex gap-3">
                    <button id="cancelDeleteBtn" class="flex-1 py-2 border border-slate-200 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700">Yes, Delete</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-slate-900 text-white px-4 py-3 rounded-lg shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 z-50 border border-slate-700">
        <span id="toastIcon"></span>
        <span id="toastMessage" class="text-xs font-medium"></span>
    </div>

    <script>
        // Initial Data
        const defaultMemos = [{
            id: "1", ref: "DEVB(W) 510/34/01", topic: "Assessing PII for Works Contracts", 
            url: "https://www.devb.gov.hk/filemanager/technicalcirculars/en/upload/5/1/C-2007-09-0-1.pdf",
            category: "Insurance / PII", conditions: "Mandatory",
            application: "Referred during tender prep for PII limits and qualifications for ICE."
        }];

        const defaultCats = ["Insurance / PII", "Conditions of Contract", "Technical Specifications", "Procurement Guidelines"];

        let memos = JSON.parse(localStorage.getItem('tender_memos')) || defaultMemos;
        let categories = JSON.parse(localStorage.getItem('tender_categories')) || defaultCats;
        let memoToDeleteId = null;

        // Elements
        const memoTableBody = document.getElementById('memoTableBody');
        const memoCount = document.getElementById('memoCount');
        const searchInput = document.getElementById('searchInput');
        const condSearchInput = document.getElementById('condSearchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const memoModal = document.getElementById('memoModal');
        const catModal = document.getElementById('catModal');
        const catList = document.getElementById('catList');
        const memoCategorySelect = document.getElementById('memoCategory');

        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toastIcon').innerHTML = type === "success" ? '<i class="fa-solid fa-circle-check text-emerald-400"></i>' : '<i class="fa-solid fa-circle-exclamation text-amber-400"></i>';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function renderTable() {
            const term = searchInput.value.toLowerCase();
            const condTerm = condSearchInput.value.toLowerCase();
            const cat = categoryFilter.value;
            const filtered = memos.filter(m => 
                (m.ref.toLowerCase().includes(term) || m.topic.toLowerCase().includes(term) || m.application.toLowerCase().includes(term)) && 
                ((m.conditions || '').toLowerCase().includes(condTerm)) &&
                (cat === 'all' || m.category === cat)
            );
            memoCount.textContent = filtered.length;
            memoTableBody.innerHTML = filtered.map(m => `
                <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                    <td class="py-3 px-4 font-semibold">${m.ref}</td>
                    <td class="py-3 px-4">${m.topic}</td>
                    <td class="py-3 px-4"><span class="px-2 py-0.5 bg-slate-100 rounded text-[10px] text-slate-600 font-medium">${m.conditions || 'N/A'}</span></td>
                    <td class="py-3 px-4 text-xs text-slate-500 leading-relaxed">${m.application}</td>
                    <td class="py-3 px-4"><span class="px-2 py-0.5 rounded text-xs border bg-white border-slate-200 text-slate-700">${m.category}</span></td>
                    <td class="py-3 px-4 text-right whitespace-nowrap">
                        <div class="flex justify-end gap-1">
                            ${m.url ? `<a href="${m.url}" target="_blank" class="p-1.5 text-slate-400 hover:text-indigo-600 transition"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>` : ''}
                            <button onclick="editMemo('${m.id}')" class="p-1.5 text-slate-400 hover:text-blue-600 transition"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteMemo('${m.id}')" class="p-1.5 text-slate-400 hover:text-red-600 transition"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderCategoryTools() {
            // Update Selects
            const filterVal = categoryFilter.value;
            categoryFilter.innerHTML = '<option value="all">All Categories</option>' + 
                categories.map(c => `<option value="${c}">${c}</option>`).join('');
            categoryFilter.value = categories.includes(filterVal) ? filterVal : 'all';

            memoCategorySelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');

            // Update List in Modal
            catList.innerHTML = categories.map((c, i) => `
                <div class="flex items-center justify-between p-2 bg-slate-50 rounded-lg border border-slate-100">
                    <span class="text-sm font-medium">${c}</span>
                    <div class="flex gap-1">
                        <button onclick="renameCategory(${i})" class="text-slate-400 hover:text-blue-600 p-1"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="removeCategory(${i})" class="text-slate-400 hover:text-red-600 p-1"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // Category Actions
        document.getElementById('addCatBtn').onclick = () => {
            const val = document.getElementById('newCatInput').value.trim();
            if (val && !categories.includes(val)) {
                categories.push(val);
                document.getElementById('newCatInput').value = '';
                saveCats();
                renderCategoryTools();
                showToast("Category added");
            }
        };

        window.removeCategory = (i) => {
            const cat = categories[i];
            if (confirm(`Deleting "${cat}" will reassign any memos in this category to "${categories[0] === cat ? categories[1] : categories[0]}". Continue?`)) {
                memos.forEach(m => { if(m.category === cat) m.category = categories[0] === cat ? categories[1] || 'General' : categories[0] });
                categories.splice(i, 1);
                saveCats();
                saveMemos();
                renderCategoryTools();
                renderTable();
            }
        };

        window.renameCategory = (i) => {
            const oldVal = categories[i];
            const newVal = prompt("Enter new name for category:", oldVal);
            if (newVal && newVal.trim() !== "" && !categories.includes(newVal.trim())) {
                memos.forEach(m => { if(m.category === oldVal) m.category = newVal.trim() });
                categories[i] = newVal.trim();
                saveCats();
                saveMemos();
                renderCategoryTools();
                renderTable();
            }
        };

        const saveCats = () => localStorage.setItem('tender_categories', JSON.stringify(categories));
        const saveMemos = () => localStorage.setItem('tender_memos', JSON.stringify(memos));

        // Memo Modal Actions
        document.getElementById('addMemoBtn').onclick = () => {
            memoModal.classList.remove('hidden');
            document.getElementById('modalTitle').textContent = "New Memo Entry";
            document.getElementById('memoForm').reset();
            document.getElementById('memoId').value = "";
            setTimeout(() => memoModal.querySelector('div').classList.remove('translate-x-full'), 10);
        };

        const closeM = () => {
            memoModal.querySelector('div').classList.add('translate-x-full');
            setTimeout(() => memoModal.classList.add('hidden'), 300);
        };

        document.getElementById('closeModalBtn').onclick = closeM;
        document.getElementById('cancelFormBtn').onclick = closeM;

        document.getElementById('saveFormBtn').onclick = () => {
            const id = document.getElementById('memoId').value;
            const data = {
                id: id || Date.now().toString(),
                ref: document.getElementById('memoRef').value,
                topic: document.getElementById('memoTopic').value,
                url: document.getElementById('memoLink').value,
                category: document.getElementById('memoCategory').value,
                conditions: document.getElementById('memoConditions').value,
                application: document.getElementById('memoApplication').value
            };
            if (!data.ref || !data.topic) return showToast("Ref and Topic are required", "error");
            if (id) {
                const idx = memos.findIndex(m => m.id === id);
                memos[idx] = data;
            } else {
                memos.push(data);
            }
            saveMemos();
            renderTable();
            closeM();
            showToast("Saved successfully");
        };

        window.editMemo = (id) => {
            const m = memos.find(x => x.id === id);
            document.getElementById('memoId').value = m.id;
            document.getElementById('memoRef').value = m.ref;
            document.getElementById('memoTopic').value = m.topic;
            document.getElementById('memoLink').value = m.url;
            document.getElementById('memoCategory').value = m.category;
            document.getElementById('memoConditions').value = m.conditions || '';
            document.getElementById('memoApplication').value = m.application;
            memoModal.classList.remove('hidden');
            document.getElementById('modalTitle').textContent = "Edit Memo Entry";
            setTimeout(() => memoModal.querySelector('div').classList.remove('translate-x-full'), 10);
        };

        window.deleteMemo = (id) => {
            memoToDeleteId = id;
            document.getElementById('deleteConfirmModal').classList.remove('hidden');
        };

        document.getElementById('confirmDeleteBtn').onclick = () => {
            memos = memos.filter(m => m.id !== memoToDeleteId);
            saveMemos();
            renderTable();
            document.getElementById('deleteConfirmModal').classList.add('hidden');
            showToast("Entry deleted", "error");
        };

        document.getElementById('cancelDeleteBtn').onclick = () => document.getElementById('deleteConfirmModal').classList.add('hidden');

        document.getElementById('manageCatsBtn').onclick = () => catModal.classList.remove('hidden');
        document.getElementById('closeCatModalBtn').onclick = () => catModal.classList.add('hidden');

        document.getElementById('exportBtn').onclick = () => {
            const blob = new Blob([JSON.stringify(memos, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tender_memos.json';
            a.click();
        };

        searchInput.oninput = renderTable;
        condSearchInput.oninput = renderTable;
        categoryFilter.onchange = renderTable;

        // Init
        renderCategoryTools();
        renderTable();
    </script>
</body>
</html>
